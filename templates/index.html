<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Tracker</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM for building the UI -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel standalone to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind Config for Custom Colors/Fonts -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 1. TIME UTILITIES ---
        function formatKickoff(utcDateString, formatType = 'full') {
            const date = new Date(utcDateString);
            
            // Omit timeZone to use the user's local device timezone
            const timeOptions = { hour: 'numeric', minute: '2-digit' };
            const dateOptions = { weekday: 'short', month: 'short', day: 'numeric' };
            
            let options = { ...dateOptions, ...timeOptions };
            if (formatType === 'time') options = timeOptions;
            if (formatType === 'date') options = dateOptions;

            return new Intl.DateTimeFormat('en-US', options).format(date);
        }

        function isWithin48Hours(utcDateString) {
            const matchDate = new Date(utcDateString);
            const now = new Date();
            const hours48InMs = 48 * 60 * 60 * 1000;
            const diff = matchDate.getTime() - now.getTime();
            return diff > 0 && diff <= hours48InMs;
        }

        // --- 2. CUSTOM HOOK FOR DATA FETCHING ---
        function useWorldCupData(endpoint) {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        setLoading(true);
                        // Fetching from our local Flask backend routes
                        const response = await fetch(`/api/${endpoint}`);
                        if (!response.ok) throw new Error('Network error loading data');
                        const result = await response.json();
                        
                        if (result.error) throw new Error(result.error);
                        
                        setData(result);
                    } catch (err) {
                        console.error(`Failed to load ${endpoint}`, err);
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
                
                // Auto-refresh every 5 minutes
                const intervalId = setInterval(fetchData, 5 * 60 * 1000);
                return () => clearInterval(intervalId);
            }, [endpoint]);

            return { data, loading, error };
        }

        // --- 3. REUSABLE MATCH CARD COMPONENT ---
        function MatchCard({ match }) {
            const timeLocal = formatKickoff(match.utcDate, 'time');
            const dateLocal = formatKickoff(match.utcDate, 'date');
            const isLive = match.status === 'IN_PLAY' || match.status === 'PAUSED';
            const hasFinished = match.status === 'FINISHED';

            return (
                <div className="flex flex-col bg-white rounded-xl shadow-sm p-4 mb-4 border border-gray-200 hover:shadow-md transition-shadow w-full">
                    <div className="flex justify-between items-center mb-4 text-sm text-gray-500 font-medium">
                        <span className="bg-gray-100 px-3 py-1 rounded text-gray-700">
                            {match.group ? match.group.replace('_', ' ') : match.stage.replace('_', ' ')}
                        </span>
                        <span className="flex items-center gap-1">
                            📅 {dateLocal} • {timeLocal}
                        </span>
                    </div>
                    
                    <div className="flex justify-between items-center text-lg font-bold">
                        <div className="flex-1 text-right pr-4 truncate">
                            <span>{match.homeTeam?.name || 'TBD'}</span>
                        </div>
                        
                        <div className={`px-4 py-2 text-white rounded-lg text-center min-w-[90px] ${isLive ? 'bg-red-600 animate-pulse' : 'bg-slate-800'}`}>
                            {hasFinished || isLive ? (
                                <span>{match.score?.fullTime?.home ?? 0} - {match.score?.fullTime?.away ?? 0}</span>
                            ) : (
                                <span className="text-sm font-normal opacity-80">vs</span>
                            )}
                        </div>
                        
                        <div className="flex-1 text-left pl-4 truncate">
                            <span>{match.awayTeam?.name || 'TBD'}</span>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 4. FEATURE COMPONENTS ---
        function Radar() {
            const { data, loading, error } = useWorldCupData('matches');
            if (loading) return <div className="text-center p-10 text-gray-500 animate-pulse">Scanning upcoming matches...</div>;
            if (error) return <div className="text-center p-10 text-red-500">Failed to load schedule.</div>;

            const upcoming = (data?.matches || []).filter(m => 
                (m.status === 'TIMED' || m.status === 'SCHEDULED') && isWithin48Hours(m.utcDate)
            );

            return (
                <div className="w-full">
                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-blue-700">
                        ⚡ Upcoming in 48 Hours
                    </h2>
                    {upcoming.length === 0 ? (
                        <div className="bg-white p-8 rounded-xl shadow-sm text-center border border-gray-100 text-gray-500">
                            No matches in the next 48 hours. Time for a breather!
                        </div>
                    ) : (
                        upcoming.map(match => <MatchCard key={match.id} match={match} />)
                    )}
                </div>
            );
        }

        function DailyHub() {
            const { data, loading, error } = useWorldCupData('matches');
            if (loading) return <div className="text-center p-10 text-gray-500">Loading daily hub...</div>;
            if (error) return <div className="text-center p-10 text-red-500">Failed to load matches.</div>;

            const recent = (data?.matches || [])
                .filter(m => m.status === 'FINISHED' || m.status === 'IN_PLAY')
                .sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate))
                .slice(0, 10); 

            return (
                <div className="w-full">
                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-emerald-700">
                        🏆 Recent & Live Results
                    </h2>
                    {recent.length === 0 ? (
                        <div className="bg-white p-8 rounded-xl shadow-sm text-center border border-gray-100 text-gray-500">
                            The tournament hasn't started yet or no matches have been played!
                        </div>
                    ) : (
                        recent.map(match => <MatchCard key={match.id} match={match} />)
                    )}
                </div>
            );
        }

        function KnockoutPhase() {
            const { data, loading, error } = useWorldCupData('matches');
            if (loading) return <div className="text-center p-10 text-gray-500">Loading bracket...</div>;
            if (error) return <div className="text-center p-10 text-red-500">Failed to load bracket.</div>;

            const knockout = (data?.matches || []).filter(m => 
                m.stage === 'LAST_32' || m.stage === 'LAST_16' || m.stage === 'QUARTER_FINALS' || m.stage === 'SEMI_FINALS' || m.stage === 'FINAL'
            );

            return (
                <div className="w-full">
                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-orange-600">
                        ⚔️ Knockout Phase
                    </h2>
                    {knockout.length === 0 ? (
                        <div className="bg-white p-8 rounded-xl shadow-sm text-center border border-gray-100 text-gray-500">
                            Knockout teams are not set yet.
                        </div>
                    ) : (
                        knockout.map(match => <MatchCard key={match.id} match={match} />)
                    )}
                </div>
            );
        }

        function Standings() {
            const { data, loading, error } = useWorldCupData('standings');
            if (loading) return <div className="text-center p-10 text-gray-500">Calculating tables...</div>;
            if (error) return <div className="text-center p-10 text-red-500">Failed to load standings.</div>;

            if (!data?.standings || data.standings.length === 0) {
                 return <div className="text-center p-10 text-gray-500">Standings not available yet.</div>;
            }

            return (
                <div className="w-full space-y-6">
                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-indigo-700">
                        📊 Group Standings
                    </h2>
                    {data.standings.map((group) => (
                        <div key={group.group} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <div className="bg-slate-100 px-4 py-2 font-bold text-slate-800 border-b border-gray-200">
                                {group.group.replace('_', ' ')}
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left">
                                    <thead className="text-xs text-gray-500 uppercase bg-gray-50">
                                        <tr>
                                            <th className="px-4 py-3">Team</th>
                                            <th className="px-3 py-3 text-center">P</th>
                                            <th className="px-3 py-3 text-center">W</th>
                                            <th className="px-3 py-3 text-center">D</th>
                                            <th className="px-3 py-3 text-center">L</th>
                                            <th className="px-3 py-3 text-center">GD</th>
                                            <th className="px-4 py-3 text-center font-bold">Pts</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {group.table.map((row, idx) => (
                                            <tr key={row.team.name} className="border-b last:border-0 hover:bg-slate-50">
                                                <td className="px-4 py-3 font-medium text-gray-900 flex items-center gap-2 whitespace-nowrap">
                                                    <span className="text-gray-400 text-xs w-3">{idx + 1}</span> {row.team.name}
                                                </td>
                                                <td className="px-3 py-3 text-center">{row.playedGames}</td>
                                                <td className="px-3 py-3 text-center">{row.won}</td>
                                                <td className="px-3 py-3 text-center">{row.draw}</td>
                                                <td className="px-3 py-3 text-center">{row.lost}</td>
                                                <td className="px-3 py-3 text-center">{row.goalDifference > 0 ? `+${row.goalDifference}` : row.goalDifference}</td>
                                                <td className="px-4 py-3 text-center font-bold text-blue-700">{row.points}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // --- 5. MAIN APP COMPONENT ---
        function App() {
            const [activeTab, setActiveTab] = useState('hub');

            const tabs = [
                { id: 'hub', label: 'Daily Hub' },
                { id: 'radar', label: '48H Radar' },
                { id: 'standings', label: 'Standings' },
                { id: 'knockout', label: 'Knockouts' }
            ];

            return (
                <div className="min-h-screen text-slate-900 pb-12">
                    {/* Header */}
                    <header className="bg-slate-900 text-white pt-8 pb-6 px-4 shadow-md">
                        <div className="max-w-4xl mx-auto flex items-center justify-center gap-3">
                            <span className="text-3xl">⚽</span>
                            <h1 className="text-2xl sm:text-3xl font-black tracking-tight">World Cup 2026 Tracker</h1>
                        </div>
                    </header>

                    {/* Navigation Tabs */}
                    <div className="bg-white shadow-sm border-b sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto px-2">
                            <nav className="flex overflow-x-auto py-3 gap-2 hide-scrollbar">
                                {tabs.map(tab => (
                                    <button 
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`whitespace-nowrap px-4 py-2 text-sm sm:text-base font-semibold rounded-full transition-all ${
                                            activeTab === tab.id 
                                                ? 'bg-blue-600 text-white shadow-md' 
                                                : 'text-slate-600 hover:bg-slate-100'
                                        }`}
                                    >
                                        {tab.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </div>
                    
                    {/* Dynamic Content */}
                    <main className="max-w-4xl mx-auto p-4 mt-4">
                        {activeTab === 'hub' && <DailyHub />}
                        {activeTab === 'radar' && <Radar />}
                        {activeTab === 'standings' && <Standings />}
                        {activeTab === 'knockout' && <KnockoutPhase />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
